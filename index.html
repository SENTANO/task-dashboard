<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d12;font-family:'DM Sans',sans-serif}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
  input::placeholder,textarea::placeholder{color:rgba(255,255,255,.22)}
  input,textarea,select{outline:none;font-family:'DM Sans',sans-serif}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

const SERVER = "https://web-production-7b224.up.railway.app";
const POLL_INTERVAL = 5000;

// ── Утилиты ───────────────────────────────────────────────────────────────────
function pColor(p){return p==="high"?"#ff4d4d":p==="medium"?"#f0a500":"#4caf8a";}
function pLabel(p){return p==="high"?"Высокий":p==="medium"?"Средний":"Низкий";}
function sColor(s){return s==="telegram"?"#2AABEE":s==="email"?"#8b5cf6":"#6b7280";}

function getWeekLabel(date){
  const now=new Date(),d=new Date(date);
  const sw=dt=>{const x=new Date(dt);x.setDate(x.getDate()-x.getDay()+1);x.setHours(0,0,0,0);return x;};
  const tw=sw(now),lw=new Date(tw);lw.setDate(lw.getDate()-7);
  const dk=sw(d);
  if(dk.getTime()===tw.getTime())return"Эта неделя";
  if(dk.getTime()===lw.getTime())return"Прошлая неделя";
  const we=new Date(dk);we.setDate(we.getDate()+6);
  return`${dk.getDate()} — ${we.getDate()} ${we.toLocaleString("ru-RU",{month:"long"})}`;
}
function getMonthLabel(date){
  const d=new Date(date),now=new Date();
  if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear())return"Этот месяц";
  const pm=new Date(now.getFullYear(),now.getMonth()-1,1);
  if(d.getMonth()===pm.getMonth()&&d.getFullYear()===pm.getFullYear())return"Прошлый месяц";
  return d.toLocaleString("ru-RU",{month:"long",year:"numeric"});
}
function groupBy(tasks,mode){
  const groups={};
  [...tasks].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(t=>{
    const label=mode==="week"?getWeekLabel(t.created_at):getMonthLabel(t.created_at);
    if(!groups[label])groups[label]=[];
    groups[label].push(t);
  });
  return groups;
}

// ── API ────────────────────────────────────────────────────────────────────────
const api = {
  get: (path) => fetch(`${SERVER}${path}`).then(r=>r.json()),
  post: (path,body) => fetch(`${SERVER}${path}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(r=>r.json()),
  patch: (path,body) => fetch(`${SERVER}${path}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(r=>r.json()),
  del: (path) => fetch(`${SERVER}${path}`,{method:"DELETE"}).then(r=>r.json()),
};

// ── Компоненты ────────────────────────────────────────────────────────────────

function Badge({color,bg,border,children}){
  return <span style={{fontSize:10,fontWeight:700,color,background:bg,border:`1px solid ${border}`,borderRadius:4,padding:"1px 6px"}}>{children}</span>;
}

function Btn({onClick,disabled,color,gradient,children,small,full}){
  const bg=disabled?"rgba(255,255,255,.06)":gradient||color||"rgba(255,255,255,.08)";
  const c=disabled?"rgba(255,255,255,.2)":"#fff";
  return(
    <button onClick={onClick} disabled={disabled} style={{
      width:full?"100%":undefined,padding:small?"6px 12px":"10px 16px",
      border:"none",borderRadius:8,background:bg,color:c,
      fontSize:small?12:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer",
      fontFamily:"'DM Sans',sans-serif",transition:"all .15s",display:"inline-flex",
      alignItems:"center",justifyContent:"center",gap:6
    }}>{children}</button>
  );
}

function Input({value,onChange,placeholder,type="text",style={}}){
  return(
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.09)",
        borderRadius:8,padding:"9px 13px",fontSize:13,color:"#f0ede8",...style}}/>
  );
}

function Select({value,onChange,children,style={}}){
  return(
    <select value={value} onChange={e=>onChange(e.target.value)} style={{
      width:"100%",background:"#1a1825",border:"1px solid rgba(255,255,255,.09)",
      borderRadius:8,padding:"9px 13px",fontSize:13,color:"#f0ede8",...style
    }}>{children}</select>
  );
}

function TaskCard({task,projects,onToggle,onDelete,onProjectChange}){
  const done=task.done;
  const proj=projects.find(p=>p.id===task.project_id);
  const client=proj?.client_name;
  return(
    <div style={{background:done?"rgba(255,255,255,.02)":"rgba(255,255,255,.055)",border:`1px solid ${done?"rgba(255,255,255,.04)":"rgba(255,255,255,.1)"}`,borderRadius:12,padding:"14px 18px",marginBottom:9,opacity:done?.5:1,transition:"all .2s"}}>
      <div style={{display:"flex",gap:12}}>
        <div onClick={()=>onToggle(task.id)} style={{width:20,height:20,borderRadius:6,flexShrink:0,marginTop:2,cursor:"pointer",border:`2px solid ${done?"#4caf8a":"rgba(255,255,255,.22)"}`,background:done?"#4caf8a":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
          {done&&<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7L10 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          {/* Badges */}
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:5}}>
            <Badge color={sColor(task.source)} bg={`${sColor(task.source)}18`} border={`${sColor(task.source)}40`}>{task.source==="telegram"?"✈️ Telegram":"✉️ Email"}</Badge>
            <Badge color={pColor(task.priority)} bg={`${pColor(task.priority)}18`} border={`${pColor(task.priority)}40`}>{pLabel(task.priority)}</Badge>
            {task.category&&<Badge color="rgba(255,255,255,.35)" bg="rgba(255,255,255,.05)" border="rgba(255,255,255,.08)">{task.category}</Badge>}
            {proj&&<Badge color="#a78bfa" bg="rgba(167,139,250,.12)" border="rgba(167,139,250,.3)">📁 {client?`${client} / `:""}{proj.name}</Badge>}
          </div>
          {/* Title */}
          <div style={{fontWeight:600,fontSize:14,marginBottom:4,color:done?"rgba(255,255,255,.3)":"#f0ede8",textDecoration:done?"line-through":"none"}}>{task.title}</div>
          {/* Description */}
          <p style={{margin:"0 0 8px",fontSize:12,color:"rgba(255,255,255,.4)",lineHeight:1.55,whiteSpace:"pre-line"}}>{task.description}</p>
          {/* Footer */}
          <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
            {task.from&&<span style={{fontSize:11,color:"rgba(255,255,255,.25)"}}>👤 {task.from}</span>}
            {task.deadline&&<span style={{fontSize:11,color:"#f0a500"}}>📅 {task.deadline}</span>}
            {task.posted_at&&<span style={{fontSize:11,color:"rgba(255,255,255,.18)"}}>{new Date(task.posted_at).toLocaleString("ru-RU",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}</span>}
            {/* Project selector */}
            {!done&&!proj&&(
              <select onChange={e=>onProjectChange(task.id,e.target.value?parseInt(e.target.value):null)} defaultValue=""
                style={{marginLeft:"auto",fontSize:11,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:5,padding:"2px 6px",color:"rgba(255,255,255,.3)",cursor:"pointer"}}>
                <option value="">📁 Проект</option>
                {projects.map(p=><option key={p.id} value={p.id}>{p.client_name?`${p.client_name} / `:""}{p.name}</option>)}
              </select>
            )}
            <button onClick={()=>onDelete(task.id)} style={{marginLeft:proj||done?"auto":"4px",fontSize:11,color:"rgba(255,255,255,.15)",background:"none",border:"none",cursor:"pointer",padding:0}}>✕</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function GroupSection({label,tasks,projects,onToggle,onDelete,onProjectChange,defaultOpen}){
  const [open,setOpen]=useState(defaultOpen);
  return(
    <div style={{marginBottom:16}}>
      <div onClick={()=>setOpen(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",cursor:"pointer",userSelect:"none"}}>
        <span style={{fontSize:11,fontWeight:700,letterSpacing:".08em",color:"rgba(255,255,255,.2)",textTransform:"uppercase"}}>{label}</span>
        <span style={{fontSize:10,color:"rgba(255,255,255,.13)",background:"rgba(255,255,255,.05)",borderRadius:10,padding:"1px 7px"}}>{tasks.length}</span>
        <span style={{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,.13)"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&tasks.map(t=><TaskCard key={t.id} task={t} projects={projects} onToggle={onToggle} onDelete={onDelete} onProjectChange={onProjectChange}/>)}
    </div>
  );
}

// ── Вкладка Проекты ───────────────────────────────────────────────────────────

function ProjectsTab({tasks,onRefresh}){
  const [clients,setClients]=useState([]);
  const [projects,setProjects]=useState([]);
  const [newClientName,setNewClientName]=useState("");
  const [newProjName,setNewProjName]=useState("");
  const [newProjClient,setNewProjClient]=useState("");
  const [loading,setLoading]=useState(false);
  const [expandedClient,setExpandedClient]=useState(null);

  const load=useCallback(async()=>{
    const [c,p]=await Promise.all([api.get("/clients"),api.get("/projects")]);
    setClients(c);setProjects(p);
    if(c.length>0&&expandedClient===null)setExpandedClient(c[0].id);
  },[]);

  useEffect(()=>{load();},[load]);

  const addClient=async()=>{
    if(!newClientName.trim())return;
    setLoading(true);
    await api.post("/clients",{name:newClientName.trim()});
    setNewClientName("");await load();setLoading(false);
  };

  const addProject=async()=>{
    if(!newProjName.trim())return;
    setLoading(true);
    await api.post("/projects",{name:newProjName.trim(),client_id:newProjClient?parseInt(newProjClient):null});
    setNewProjName("");setNewProjClient("");await load();onRefresh();setLoading(false);
  };

  const removeClient=async(id)=>{
    await api.del(`/clients/${id}`);await load();onRefresh();
  };

  const removeProject=async(id)=>{
    await api.del(`/projects/${id}`);await load();onRefresh();
  };

  // Статистика по проектам
  const tasksByProject={};
  tasks.forEach(t=>{
    const key=t.project_id||"none";
    if(!tasksByProject[key])tasksByProject[key]={total:0,active:0};
    tasksByProject[key].total++;
    if(!t.done)tasksByProject[key].active++;
  });
  const noProject=tasks.filter(t=>!t.project_id);

  return(
    <div style={{animation:"fadeUp .3s ease both"}}>

      {/* Статистика */}
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        {[
          {label:"Клиентов",value:clients.length,color:"#a78bfa"},
          {label:"Проектов",value:projects.length,color:"#7dd3fc"},
          {label:"Без проекта",value:noProject.filter(t=>!t.done).length,color:"#f0a500"},
        ].map(s=>(
          <div key={s.label} style={{flex:1,minWidth:80,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:10,padding:"9px 12px",textAlign:"center"}}>
            <div style={{fontSize:20,fontFamily:"'Syne',sans-serif",fontWeight:800,color:s.color}}>{s.value}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.25)",marginTop:1}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Список клиентов и проектов */}
      <div style={{marginBottom:18}}>
        {clients.length===0?(
          <div style={{textAlign:"center",padding:"28px 0",color:"rgba(255,255,255,.2)",fontSize:13}}>Клиентов пока нет — добавьте ниже</div>
        ):(
          clients.map(c=>{
            const cProjects=projects.filter(p=>p.client_id===c.id);
            const cTasks=tasks.filter(t=>cProjects.some(p=>p.id===t.project_id));
            const activeTasks=cTasks.filter(t=>!t.done).length;
            const isOpen=expandedClient===c.id;
            return(
              <div key={c.id} style={{marginBottom:8,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,overflow:"hidden"}}>
                {/* Клиент заголовок */}
                <div onClick={()=>setExpandedClient(isOpen?null:c.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",cursor:"pointer"}}>
                  <span style={{fontSize:15}}>🏢</span>
                  <span style={{fontWeight:700,fontSize:14,color:"#f0ede8"}}>{c.name}</span>
                  <span style={{fontSize:11,color:"rgba(255,255,255,.25)",marginLeft:4}}>{cProjects.length} проектов</span>
                  {activeTasks>0&&<span style={{fontSize:10,fontWeight:700,color:"#f0a500",background:"rgba(240,165,0,.12)",border:"1px solid rgba(240,165,0,.25)",borderRadius:10,padding:"1px 7px",marginLeft:4}}>{activeTasks} задач</span>}
                  <span style={{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,.2)"}}>{isOpen?"▲":"▼"}</span>
                  <button onClick={e=>{e.stopPropagation();removeClient(c.id);}} style={{fontSize:11,color:"rgba(255,255,255,.15)",background:"none",border:"none",cursor:"pointer",padding:"0 0 0 8px"}}>✕</button>
                </div>
                {/* Проекты клиента */}
                {isOpen&&(
                  <div style={{padding:"0 16px 12px"}}>
                    {cProjects.length===0?(
                      <div style={{fontSize:12,color:"rgba(255,255,255,.2)",padding:"8px 0"}}>Проектов нет</div>
                    ):(
                      cProjects.map(p=>{
                        const ps=tasksByProject[p.id]||{total:0,active:0};
                        return(
                          <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"rgba(255,255,255,.03)",borderRadius:8,marginBottom:5}}>
                            <span style={{fontSize:13}}>📁</span>
                            <span style={{fontSize:13,fontWeight:600,color:"#d4d0f0"}}>{p.name}</span>
                            {ps.active>0&&<span style={{fontSize:10,color:"#7dd3fc",background:"rgba(125,211,252,.1)",border:"1px solid rgba(125,211,252,.2)",borderRadius:8,padding:"1px 6px"}}>{ps.active} активных</span>}
                            {ps.total>0&&<span style={{fontSize:10,color:"rgba(255,255,255,.2)"}}>{ps.total} всего</span>}
                            <button onClick={()=>removeProject(p.id)} style={{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,.15)",background:"none",border:"none",cursor:"pointer"}}>✕</button>
                          </div>
                        );
                      })
                    )}
                  </div>
                )}
              </div>
            );
          })
        )}

        {/* Проекты без клиента */}
        {projects.filter(p=>!p.client_id).length>0&&(
          <div style={{marginTop:8,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:12,padding:"12px 16px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.25)",letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>Без клиента</div>
            {projects.filter(p=>!p.client_id).map(p=>{
              const ps=tasksByProject[p.id]||{total:0,active:0};
              return(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0"}}>
                  <span style={{fontSize:13}}>📁</span>
                  <span style={{fontSize:13,color:"#d4d0f0"}}>{p.name}</span>
                  {ps.active>0&&<span style={{fontSize:10,color:"#7dd3fc"}}>{ps.active} активных</span>}
                  <button onClick={()=>removeProject(p.id)} style={{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,.15)",background:"none",border:"none",cursor:"pointer"}}>✕</button>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Форма добавления */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {/* Новый клиент */}
        <div style={{background:"rgba(167,139,250,.07)",border:"1px solid rgba(167,139,250,.2)",borderRadius:12,padding:"14px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#a78bfa",marginBottom:10}}>🏢 Новый клиент</div>
          <Input value={newClientName} onChange={setNewClientName} placeholder="Название клиента" style={{marginBottom:8}}/>
          <Btn onClick={addClient} disabled={loading||!newClientName.trim()} full gradient="linear-gradient(135deg,#a78bfa,#8b5cf6)">Добавить</Btn>
        </div>
        {/* Новый проект */}
        <div style={{background:"rgba(125,211,252,.06)",border:"1px solid rgba(125,211,252,.18)",borderRadius:12,padding:"14px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#7dd3fc",marginBottom:10}}>📁 Новый проект</div>
          <Input value={newProjName} onChange={setNewProjName} placeholder="Название проекта" style={{marginBottom:8}}/>
          <Select value={newProjClient} onChange={setNewProjClient} style={{marginBottom:8}}>
            <option value="">Без клиента</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </Select>
          <Btn onClick={addProject} disabled={loading||!newProjName.trim()} full gradient="linear-gradient(135deg,#7dd3fc,#2AABEE)">Добавить</Btn>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────

function App(){
  const [tab,setTab]=useState("tasks");
  const [tasks,setTasks]=useState([]);
  const [projects,setProjects]=useState([]);
  const [serverOk,setServerOk]=useState(null);
  const [lastSync,setLastSync]=useState(null);
  const [error,setError]=useState("");
  const [groupMode,setGroupMode]=useState("week");
  const [filterProject,setFilterProject]=useState("all"); // "all" | "none" | project_id
  const [filterSource,setFilterSource]=useState("all");
  const pollRef=useRef(null);

  const fetchAll=useCallback(async()=>{
    try{
      const [t,p]=await Promise.all([api.get("/tasks"),api.get("/projects")]);
      setTasks(t);setProjects(p);
      setServerOk(true);setLastSync(new Date());
    }catch{setServerOk(false);}
  },[]);

  useEffect(()=>{
    fetchAll();
    pollRef.current=setInterval(fetchAll,POLL_INTERVAL);
    return()=>clearInterval(pollRef.current);
  },[fetchAll]);

  const toggleDone=async(id)=>{
    const task=tasks.find(t=>t.id===id);
    if(!task)return;
    try{
      if(!task.done)await api.patch(`/tasks/${id}/done`);
      else{setTasks(prev=>prev.map(t=>t.id===id?{...t,done:false}:t));return;}
      fetchAll();
    }catch{setError("Сервер недоступен");}
  };

  const deleteTask=async(id)=>{
    try{await api.del(`/tasks/${id}`);fetchAll();}
    catch{setError("Сервер недоступен");}
  };

  const changeProject=async(taskId,projectId)=>{
    try{await api.patch(`/tasks/${taskId}/project`,{project_id:projectId});fetchAll();}
    catch{setError("Сервер недоступен");}
  };

  // Фильтрация
  const applyFilters=(list)=>{
    let r=list;
    if(filterProject==="none")r=r.filter(t=>!t.project_id);
    else if(filterProject!=="all")r=r.filter(t=>t.project_id===parseInt(filterProject));
    if(filterSource!=="all")r=r.filter(t=>t.source===filterSource);
    return r;
  };

  const pending=applyFilters(tasks.filter(t=>!t.done));
  const done=applyFilters(tasks.filter(t=>t.done));
  const doneGroups=groupBy(done,groupMode);
  const allPending=tasks.filter(t=>!t.done);

  const TABS=[
    {id:"tasks",label:`✦ Активные${allPending.length?` (${allPending.length})`:""}`,ac:"#f0ede8",bg:"rgba(255,255,255,.08)"},
    {id:"done",label:`✓ Выполнено${tasks.filter(t=>t.done).length?` (${tasks.filter(t=>t.done).length})`:""}`,ac:"#4caf8a",bg:"rgba(76,175,138,.14)"},
    {id:"projects",label:"📁 Проекты",ac:"#a78bfa",bg:"rgba(167,139,250,.15)"},
    {id:"email",label:"✉️ Email",ac:"#c4b5fd",bg:"rgba(139,92,246,.16)"},
    {id:"telegram",label:"✈️ Telegram",ac:"#7dd3fc",bg:"rgba(43,171,238,.16)"},
  ];

  const FilterBar=()=>(
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:11,color:"rgba(255,255,255,.25)"}}>Фильтр:</span>
      <select value={filterProject} onChange={e=>setFilterProject(e.target.value)} style={{fontSize:11,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:6,padding:"4px 8px",color:"rgba(255,255,255,.5)"}}>
        <option value="all">Все проекты</option>
        <option value="none">Без проекта</option>
        {projects.map(p=><option key={p.id} value={p.id}>{p.client_name?`${p.client_name} / `:""}{p.name}</option>)}
      </select>
      <select value={filterSource} onChange={e=>setFilterSource(e.target.value)} style={{fontSize:11,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:6,padding:"4px 8px",color:"rgba(255,255,255,.5)"}}>
        <option value="all">Все источники</option>
        <option value="telegram">Telegram</option>
        <option value="email">Email</option>
      </select>
      {(filterProject!=="all"||filterSource!=="all")&&(
        <button onClick={()=>{setFilterProject("all");setFilterSource("all");}} style={{fontSize:11,color:"rgba(255,255,255,.3)",background:"none",border:"none",cursor:"pointer"}}>✕ сбросить</button>
      )}
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(140deg,#0d0d12 0%,#13111e 55%,#0d1117 100%)",padding:"24px 16px",display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:780}}>

        {/* HEADER */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,animation:"fadeUp .4s ease both"}}>
          <div style={{width:34,height:34,borderRadius:9,background:"linear-gradient(135deg,#8b5cf6,#2AABEE)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>✦</div>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:21,color:"#f0ede8",letterSpacing:"-.03em"}}>Task Dashboard</h1>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:".1em",color:"#8b5cf6",background:"rgba(139,92,246,.15)",border:"1px solid rgba(139,92,246,.3)",borderRadius:4,padding:"2px 7px"}}>CLAUDE</span>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:serverOk===null?"#f0a500":serverOk?"#4caf8a":"#ff4d4d",animation:serverOk?"blink 2s infinite":"none"}}/>
            <span style={{fontSize:11,color:"rgba(255,255,255,.25)"}}>
              {serverOk===null?"подключение…":serverOk?`онлайн · ${lastSync?.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}`:"офлайн"}
            </span>
          </div>
        </div>

        {/* TABS */}
        <div style={{display:"flex",gap:3,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,padding:3,marginBottom:14,flexWrap:"wrap"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,minWidth:60,padding:"8px 6px",borderRadius:9,border:"none",background:tab===t.id?t.bg:"transparent",color:tab===t.id?t.ac:"rgba(255,255,255,.28)",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all .18s",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>{t.label}</button>
          ))}
        </div>

        {/* СТАТИСТИКА (только на главных вкладках) */}
        {(tab==="tasks"||tab==="done")&&(
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {[
              {label:"Всего",value:tasks.length,color:"#8b5cf6"},
              {label:"Активных",value:allPending.length,color:"#f0a500"},
              {label:"Выполнено",value:tasks.filter(t=>t.done).length,color:"#4caf8a"},
              {label:"Email",value:tasks.filter(t=>t.source==="email").length,color:"#c4b5fd"},
              {label:"Telegram",value:tasks.filter(t=>t.source==="telegram").length,color:"#7dd3fc"},
              {label:"Без проекта",value:allPending.filter(t=>!t.project_id).length,color:"#f0a500"},
            ].map(s=>(
              <div key={s.label} style={{flex:1,minWidth:65,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,padding:"8px 10px",textAlign:"center",cursor:"pointer"}}
                onClick={()=>{
                  if(s.label==="Email"){setFilterSource("email");setTab("tasks");}
                  else if(s.label==="Telegram"){setFilterSource("telegram");setTab("tasks");}
                  else if(s.label==="Без проекта"){setFilterProject("none");setTab("tasks");}
                  else{setFilterSource("all");setFilterProject("all");}
                }}>
                <div style={{fontSize:18,fontFamily:"'Syne',sans-serif",fontWeight:800,color:s.color}}>{s.value}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.22)",marginTop:1}}>{s.label}</div>
              </div>
            ))}
          </div>
        )}

        {/* АКТИВНЫЕ ЗАДАЧИ */}
        {tab==="tasks"&&(
          <div style={{animation:"fadeUp .3s ease both"}}>
            <FilterBar/>
            {pending.length===0?(
              <div style={{textAlign:"center",padding:"50px 0",color:"rgba(255,255,255,.18)"}}>
                <div style={{fontSize:28,marginBottom:8}}>🎉</div>
                <p style={{fontSize:14}}>{serverOk?"Все задачи выполнены!":"Подключение к серверу..."}</p>
              </div>
            ):(
              pending.map(t=><TaskCard key={t.id} task={t} projects={projects} onToggle={toggleDone} onDelete={deleteTask} onProjectChange={changeProject}/>)
            )}
          </div>
        )}

        {/* ВЫПОЛНЕННЫЕ */}
        {tab==="done"&&(
          <div style={{animation:"fadeUp .3s ease both"}}>
            <FilterBar/>
            {done.length===0?(
              <div style={{textAlign:"center",padding:"50px 0",color:"rgba(255,255,255,.18)"}}>
                <div style={{fontSize:28,marginBottom:8}}>📭</div>
                <p style={{fontSize:14}}>Выполненных задач нет</p>
              </div>
            ):(
              <>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                  <span style={{fontSize:12,color:"rgba(255,255,255,.25)"}}>Группировать:</span>
                  <div style={{display:"flex",gap:3,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:8,padding:3}}>
                    {[{id:"week",label:"По неделям"},{id:"month",label:"По месяцам"}].map(m=>(
                      <button key={m.id} onClick={()=>setGroupMode(m.id)} style={{padding:"5px 12px",borderRadius:6,border:"none",background:groupMode===m.id?"rgba(255,255,255,.09)":"transparent",color:groupMode===m.id?"#f0ede8":"rgba(255,255,255,.28)",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{m.label}</button>
                    ))}
                  </div>
                  <span style={{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,.18)"}}>{done.length} задач</span>
                </div>
                {Object.entries(doneGroups).map(([label,group],i)=>(
                  <GroupSection key={label} label={label} tasks={group} projects={projects} onToggle={toggleDone} onDelete={deleteTask} onProjectChange={changeProject} defaultOpen={i===0}/>
                ))}
              </>
            )}
          </div>
        )}

        {/* ПРОЕКТЫ */}
        {tab==="projects"&&(
          <ProjectsTab tasks={tasks} onRefresh={fetchAll}/>
        )}

        {/* EMAIL */}
        {tab==="email"&&(
          <div style={{animation:"fadeUp .3s ease both"}}>
            {tasks.filter(t=>t.source==="email").length===0?(
              <div style={{textAlign:"center",padding:"50px 0",color:"rgba(255,255,255,.18)"}}>
                <div style={{fontSize:28,marginBottom:8}}>📭</div>
                <p style={{fontSize:14}}>Задач из Email пока нет</p>
              </div>
            ):(
              <>
                {tasks.filter(t=>t.source==="email"&&!t.done).length>0&&(
                  <>
                    <p style={{fontSize:11,fontWeight:700,letterSpacing:".08em",color:"rgba(255,255,255,.2)",textTransform:"uppercase",marginBottom:9}}>Активные · {tasks.filter(t=>t.source==="email"&&!t.done).length}</p>
                    {tasks.filter(t=>t.source==="email"&&!t.done).map(t=><TaskCard key={t.id} task={t} projects={projects} onToggle={toggleDone} onDelete={deleteTask} onProjectChange={changeProject}/>)}
                  </>
                )}
                {tasks.filter(t=>t.source==="email"&&t.done).length>0&&(
                  <>
                    <p style={{fontSize:11,fontWeight:700,letterSpacing:".08em",color:"rgba(255,255,255,.13)",textTransform:"uppercase",margin:"18px 0 9px"}}>Выполнено · {tasks.filter(t=>t.source==="email"&&t.done).length}</p>
                    {tasks.filter(t=>t.source==="email"&&t.done).map(t=><TaskCard key={t.id} task={t} projects={projects} onToggle={toggleDone} onDelete={deleteTask} onProjectChange={changeProject}/>)}
                  </>
                )}
              </>
            )}
          </div>
        )}

        {/* TELEGRAM */}
        {tab==="telegram"&&(
          <div style={{animation:"fadeUp .3s ease both"}}>
            {tasks.filter(t=>t.source==="telegram").length===0?(
              <div style={{textAlign:"center",padding:"50px 0",color:"rgba(255,255,255,.18)"}}>
                <div style={{fontSize:28,marginBottom:8}}>✈️</div>
                <p style={{fontSize:14}}>Задач из Telegram пока нет</p>
                <p style={{fontSize:12,marginTop:6,color:"rgba(255,255,255,.1)"}}>Напишите боту — задачи появятся здесь</p>
              </div>
            ):(
              <>
                {tasks.filter(t=>t.source==="telegram"&&!t.done).length>0&&(
                  <>
                    <p style={{fontSize:11,fontWeight:700,letterSpacing:".08em",color:"rgba(255,255,255,.2)",textTransform:"uppercase",marginBottom:9}}>Активные · {tasks.filter(t=>t.source==="telegram"&&!t.done).length}</p>
                    {tasks.filter(t=>t.source==="telegram"&&!t.done).map(t=><TaskCard key={t.id} task={t} projects={projects} onToggle={toggleDone} onDelete={deleteTask} onProjectChange={changeProject}/>)}
                  </>
                )}
                {tasks.filter(t=>t.source==="telegram"&&t.done).length>0&&(
                  <>
                    <p style={{fontSize:11,fontWeight:700,letterSpacing:".08em",color:"rgba(255,255,255,.13)",textTransform:"uppercase",margin:"18px 0 9px"}}>Выполнено · {tasks.filter(t=>t.source==="telegram"&&t.done).length}</p>
                    {tasks.filter(t=>t.source==="telegram"&&t.done).map(t=><TaskCard key={t.id} task={t} projects={projects} onToggle={toggleDone} onDelete={deleteTask} onProjectChange={changeProject}/>)}
                  </>
                )}
              </>
            )}
          </div>
        )}

        {error&&<div style={{marginTop:12,padding:"11px 15px",background:"rgba(255,77,77,.1)",border:"1px solid rgba(255,77,77,.3)",borderRadius:10,fontSize:13,color:"#ff8080"}}>⚠ {error}</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
